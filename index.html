<script>
function js1(num){    
// まず、meter のための指定
    var gage = document.getElementById('mtr1');
    gage.value = num.value;
// ココから下は コメントのための指定
    var comment = document.getElementById('cmt');
    if (num.value <= 512) {
        comment.value = "ディスク残量は半分以上あります";
    } else if (num.value > 512, num.value <= 819) {
        comment.value = "ディスク残量が半分以下になりました";
    } else if (num.value > 819, num.value <= 1023) {
        comment.value = "ディスク残量が２割以下になりました";
    } else if (num.value = 1024) {
      comment.value = "ディスクは満杯です"
    }
}
</script><style type="text/css">

<script>
// index.htmlのService Worker登録部分
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
  .then(registration => {
    registration.addEventListener('updatefound', () => {
      const newWorker = registration.installing;

      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          alert('New version is ready! Please reload!');
        }
      });
    });
  });
}
</script>
